name: 每日股票分析

on:
  # 定时触发 - 每天北京时间 18:00 (UTC 10:00)
  schedule:
    - cron: '30 1 * * 1-5'     # 周一到周五，UTC 10:00 = 北京时间 9:30
  
  # 手动触发
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full          # 完整分析（股票+大盘）
          - market-only   # 仅大盘复盘
          - stocks-only   # 仅股票分析
      force_run:
        description: '强制运行（跳过交易日检查）'
        required: false
        default: true      # 💡 建议手动触发时默认 true，方便测试
        type: boolean

# 并发控制：同一时间只运行一个分析任务
concurrency:
  group: stock-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 随机延迟
        run: sleep $((RANDOM % 10))  # 减少启动等待时间
      
      - name: 检出代码
        uses: actions/checkout@v5
      
      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 创建必要目录
        run: mkdir -p data logs reports
      
      - name: 执行股票分析
        env:
          # ==========================================
          # AI 配置 (核心优化部分)
          # ==========================================
          # 设置主模型
         env:
          # === 核心模型配置 ===
          LITELLM_MODEL: 'gemini/gemini-1.5-flash'
          # 💡 这里多放几个备选，确保万无一失
          LITELLM_FALLBACK_MODELS: 'openai/gpt-4o-mini,openai/deepseek-chat,gemini/gemini-1.5-flash'
          
          # === Gemini 主力配置 ===
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_REQUEST_DELAY: '20.0'  # 💡 增加到20秒，彻底避开免费版频率限制
          
          # === AIHubMix 备选配置 ===
          AIHUBMIX_KEY: ${{ secrets.AIHUBMIX_KEY }}
          OPENAI_API_KEY: ${{ secrets.AIHUBMIX_KEY }} # 💡 某些插件需要这个变量名
          OPENAI_BASE_URL: 'https://api.aihubmix.com/v1'
          
          # === 报告深度配置 ===
          # 💡 必须设置为 full 才能看到“风险警报”和“利好催化”
          REPORT_TYPE: 'full' 
          # 💡 开启搜索功能，否则 AI 没法写“重要信息速览”
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          BOCHA_API_KEYS: ${{ secrets.BOCHA_API_KEYS }}

          # ==========================================
          # 数据源与搜索
          # ==========================================
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          BOCHA_API_KEYS: ${{ secrets.BOCHA_API_KEYS }}
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          
          # ==========================================
          # 通知渠道 (钉钉请填在 CUSTOM_WEBHOOK_URLS)
          # ==========================================
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          CUSTOM_WEBHOOK_URLS: ${{ secrets.CUSTOM_WEBHOOK_URLS }}
          
          # ==========================================
          # 自选股与运行配置
          # ==========================================
          STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST || '600519' }}
          REPORT_TYPE: ${{ vars.REPORT_TYPE || secrets.REPORT_TYPE || 'simple' }}
          MARKET_REVIEW_ENABLED: 'true'
          TRADING_DAY_CHECK_ENABLED: 'true'
          MAX_WORKERS: '1'

        run: |
          # 判断运行模式
          MODE="${{ github.event.inputs.mode || 'full' }}"
          FORCE_RUN_ARG=""
          if [ "${{ github.event.inputs.force_run }}" = "true" ] || [ "${{ github.event.schedule }}" = "" ]; then
            FORCE_RUN_ARG="--force-run"
            echo "⚡ 强制运行开启"
          fi

          # 执行分析命令
          if [ "$MODE" = "market-only" ]; then
            python main.py --market-review $FORCE_RUN_ARG
          elif [ "$MODE" = "stocks-only" ]; then
            python main.py --no-market-review $FORCE_RUN_ARG
          else
            python main.py $FORCE_RUN_ARG
          fi
      
      - name: 上传分析报告
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: analysis-reports-${{ github.run_number }}
          path: |
            reports/
            logs/
